<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LA TAVERNA - GDR Headquarters</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* Reset e Variabili Color Palette */
:root {
  --bg-deep: #0a0a0c;
  --bg-accent: #120018;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.06); /* Bordi ancora più sottili */
  --glass-bg: rgba(22, 22, 26, 0.6);
  --card-bg: rgba(255, 255, 255, 0.02);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: 
    radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.08), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(124, 58, 237, 0.05), transparent 40%),
    var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

/* --- NUOVO: Bottone di Branding "LA TAVERNA" --- */
#main-title-btn { 
  background: transparent;
  border: 1px solid var(--border-color);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 36px; 
  font-weight: 800;
  letter-spacing: -1.5px;
  color: #fff; 
  text-shadow: 0 0 15px rgba(169,83,236,0.3); 
  margin-bottom: 30px; 
  text-align: center; 
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: block; /* Assicura che si comporti come un blocco */
}
#main-title-btn:hover { 
  transform: translateY(-2px); 
  border-color: rgba(169, 83, 236, 0.4);
  box-shadow: 0 10px 30px rgba(169,83,236,0.15);
}

/* Container UI - Glassmorphism professionale */
#ui {
  width: 100%;
  max-width: 1000px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* Form Styling */
.login-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 30px; text-align: center; color: #fff; }
.form-group { margin-bottom: 20px; text-align: left; }
.form-group label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; }
.form-group input {
  width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border-color); 
  background: rgba(0, 0, 0, 0.2); color: #fff; font-size: 15px; transition: 0.3s;
}
.form-group input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(169, 83, 236, 0.15); }

/* Button Styling (Main & Discord) */
.btn { 
  width: 100%; padding: 14px; background: var(--accent-purple); color: white; border: none; 
  border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; 
}
.btn:hover { background: #9333ea; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(169,83,236,0.2); }

.social-btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; 
  background: #5865F2; color: white; border: none; padding: 14px; border-radius: 10px; 
  cursor: pointer; font-weight: 700; transition: 0.3s; margin-top: 15px;
}
.social-btn:hover { background: #4752c4; transform: translateY(-1px); }

/* Divider minimalista */
.divider { text-align:center; margin:25px 0; position:relative; color: #444; font-size: 12px; text-transform: uppercase; }
.divider::before,.divider::after { content:""; position:absolute; top:50%; width:35%; height:1px; background: var(--border-color); }
.divider::before { left:0; } .divider::after { right:0; }

/* Dashboard Layout & Cards (GDR focused) */
.platform-body { display: grid; grid-template-columns: 260px 1fr; gap: 30px; margin-top: 20px; }
.pt-aside { display: flex; flex-direction: column; gap: 20px; }
.pt-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; }

/* Profile Card */
.pt-avatar { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, var(--accent-purple), #7a4cc1); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
.pt-profile { display: flex; gap: 12px; align-items: center; }
.pt-name { font-weight: 700; color: #fff; }
.pt-email { font-size: 12px; color: var(--text-muted); }

/* Navigazione Dashboard */
.pt-nav { display: flex; flex-direction: column; gap: 6px; }
.tab-btn { 
  background: transparent; border: none; color: var(--text-muted); padding: 12px 16px; 
  border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 14px;
}
.tab-btn:hover { background: rgba(255, 255, 255, 0.03); color: #fff; }
.tab-btn.active { background: rgba(169, 83, 236, 0.08); color: var(--accent-purple); font-weight: 600; }

/* Quick Actions & GDR Specific Stats */
.pt-quick { background: rgba(0, 0, 0, 0.2); }
.pt-quick-title { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
.pt-quick-btn { width: 100%; padding: 10px; background: #6f3bd6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
.pt-quick-btn:hover { background: #5a2eb8; }

.pt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.pt-stat { padding: 18px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; }
.pt-stat h4 { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
.pt-stat-value { font-size: 24px; font-weight: 800; color: #fff; }
.pt-stat-sub { font-size: 11px; color: #555; margin-top: 4px; }

/* GDR Activity Feed & Contacts */
.pt-activity li { padding: 14px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; color: var(--text-muted); }
.muted { color: #555; font-size: 11px; margin-left: 10px; }
.pt-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #fff; }

.pt-toast { position: fixed; right: 24px; bottom: 24px; background: #fff; color: #000; padding: 16px 24px; border-radius: 12px; font-weight: 600; box-shadow: 0 20px 40px rgba(0,0,0,0.4); opacity: 0; transform: translateY(10px); transition: 0.3s; }
.pt-toast.show { opacity: 1; transform: translateY(0); }

.footer { text-align: center; margin-top: 25px; font-size: 13px; color: #666; }
.footer a { color: var(--accent-purple); text-decoration: none; cursor: pointer; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<button id="main-title-btn">LA TAVERNA</button>
<div id="ui" style="display:none;"></div>

<script type="module">
// --- CONFIG DISCORD ---
const CONFIG = {
  DISCORD_CLIENT_ID: '1478809987357868083',
  DISCORD_REDIRECT_URI: 'https://nyc.cloud.appwrite.io/v1/account/sessions/oauth2/callback/discord/69a85edc001553a4b931'
};

const uiContainer = document.getElementById('ui');
const mainTitleBtn = document.getElementById('main-title-btn');

// --- RENDER LOGIN ---
function renderLogin() {
  document.title = "LaTaverna - Login";
  uiContainer.style.display = "block";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Accedi al Quartier Generale</h2></div>
    <form id="login-form">
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Inserisci la tua password" required /></div>
      <button type="submit" class="btn" id="login-btn">Entra nella Taverna</button>
      
      <div class="divider"><span>Oppure</span></div>
      
      <button type="button" class="social-btn" id="discord-login">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        Discord
      </button>
      <div class="footer">Nuovo qui? <a id="toRegister">Crea un account</a></div>
    </form>
  `;

  // Logica esistente dei link e bottoni...
  document.getElementById('toRegister').onclick = e => { e.preventDefault(); renderRegister(); };
  document.getElementById('discord-login').onclick = () => {
    const url = `https://discord.com/oauth2/authorize?client_id=${CONFIG.DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.DISCORD_REDIRECT_URI)}&response_type=code&scope=identify%20email`;
    window.location.href = url;
  };
  document.getElementById('login-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: "Viandante" };
    showPlatform(user);
  };
}

// --- RENDER REGISTER (Minimalista) ---
function renderRegister() {
  document.title = "LaTaverna - Registrati";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Registrati</h2></div>
    <form id="register-form">
      <div class="form-group"><label for="username">Username</label><input type="text" id="username" placeholder="Scegli il tuo nome" required /></div>
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Crea una password sicura" required /></div>
      <button type="submit" class="btn" id="register-btn">Inizia l'Avventura</button>
      <div class="footer">Hai già un account? <a id="toLogin">Login</a></div>
    </form>
  `;
  document.getElementById('toLogin').onclick = e => { e.preventDefault(); renderLogin(); };
  document.getElementById('register-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: document.getElementById('username').value };
    showPlatform(user);
  };
}

// --- SHOW PLATFORM (GDR Aggiornata) ---
function showPlatform(user) {
  document.title = `LaTaverna - Dashboard di ${user.username}`;

  uiContainer.innerHTML = `
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <div>
        <h2 style="font-size: 20px; font-weight: 700; color: #fff;">Quartier Generale</h2>
        <div style="color: var(--text-muted); font-size: 13px;">Benvenuto, Viandante <span id="pt-username">${user.username}</span></div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="pt-notif" class="tab-btn" style="border: 1px solid var(--border-color);">🔔</button>
        <button id="logout-btn" class="btn small" style="padding: 8px 16px; font-size: 14px; width: auto;">Esci</button>
      </div>
    </header>

    <div class="platform-body">
      <aside class="pt-aside">
        <div class="pt-card pt-profile">
          <div class="pt-avatar">${(user.username||'U').slice(0,1).toUpperCase()}</div>
          <div>
            <div class="pt-name">${user.username}</div>
            <div class="pt-email">${user.email || 'GDR Player'}</div>
          </div>
        </div>

        <nav class="pt-nav">
          <button class="tab-btn active" data-tab="dashboard">🏠 Dashboard</button>
          <button class="tab-btn" data-tab="attivita">📝 Note di Sessione</button>
          <button class="tab-btn" data-tab="clienti">👥 Lista NPC</button>
          <button class="tab-btn" data-tab="impostazioni">⚙️ Impostazioni</button>
        </nav>
      </aside>

      <main id="tab-content">
        </main>
    </div>
  `;

  // Logica logout, notifiche e tab identica...
  document.getElementById('logout-btn').onclick = () => {
    mainTitleBtn.style.display = "block";
    uiContainer.style.display = "none";
    document.title = "LA TAVERNA";
  };
  document.getElementById('pt-notif').onclick = () => {
    const n = document.createElement('div');
    n.className = 'pt-toast';
    n.textContent = 'Notifica: Lo Scriba AI ha completato il riassunto della sessione 12.';
    document.body.appendChild(n);
    setTimeout(() => n.classList.add('show'), 10);
    setTimeout(() => n.classList.remove('show'), 4000);
    setTimeout(() => n.remove(), 4500);
  };

  const tabButtons = uiContainer.querySelectorAll('.tab-btn');
  const tabContent = document.getElementById('tab-content');

  function openTab(tab) {
    tabButtons.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    switch (tab) {
      case 'dashboard':
        // --- NUOVO: Statistiche orientate al GDR (Note, Personaggi, Sessioni) ---
        tabContent.innerHTML = `
          <section class="pt-grid">
            <article class="pt-stat">
              <h4>Membri del Party</h4>
              <div class="pt-stat-value">5</div>
              <div class="pt-stat-sub">4 Giocatori + GM</div>
            </article>
            <article class="pt-stat">
              <h4>Sessioni Giocate</h4>
              <div class="pt-stat-value">12</div>
              <div class="pt-stat-sub">Media: 1 ogni 10gg</div>
            </article>
            <article class="pt-stat">
              <h4>NPC Creati (AI)</h4>
              <div class="pt-stat-value">48</div>
              <div class="pt-stat-sub">12 Alleati, 36 Nemici</div>
            </article>
            <article class="pt-stat">
              <h4>Prossima Sessione</h4>
              <div class="pt-stat-value" style="font-size: 18px; color: var(--accent-purple);">10 MARZO - 21:00</div>
              <div class="pt-stat-sub">"L'Ombra del Drago Bianco"</div>
            </article>
          </section>

          <section class="pt-section" style="margin-top: 25px;">
            <h3>Note Importanti della Campagna</h3>
            <ul class="pt-activity">
              <li><strong>Gioitz</strong> ha aggiunto la nota: "Il ciondolo di Elara brilla vicino ai santuari". <span class="muted">2 ore fa</span></li>
              <li><strong>Scriba AI</strong> ha riassunto la Sessione 12. <span class="muted">ieri</span></li>
              <li><strong>GM</strong> ha aggiornato la mappa del "Picco dei Giganti". <span class="muted">3gg fa</span></li>
            </ul>
          </section>
        `;
        break;
      // Tab secondari... (semplificati per demo)
      default:
        tabContent.innerHTML = `<section class="pt-section"><h3>Sezione ${tab.toUpperCase()}</h3><p style="color:var(--text-muted);">In caricamento...</p></section>`;
        break;
    }
  }

  tabButtons.forEach(btn => btn.onclick = () => openTab(btn.dataset.tab));
  openTab('dashboard'); // default
}

// NUOVO: Logica click sul tasto di branding
mainTitleBtn.onclick = () => {
  mainTitleBtn.style.display = "none";
  renderLogin();
};
</script>
</body>
</html>
