<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LA TAVERNA</title>
<style>
/* --- IL TUO STILE ORIGINALE "PREMIUM" --- */
* { margin: 0px; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body {
  background:
    radial-gradient(circle at 20% 30%, rgba(169,83,236,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(128,0,128,0.35), transparent 40%),
    radial-gradient(circle at top left, #2a0a3a, #120018),
    linear-gradient(135deg,#0f0617,#1c0828,#260c35);
    margin: 0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;
    transition: justify-content 0.3s ease;
}

/* Stato Dashboard Attiva: allinea tutto in alto e rende il layout fluido */
body.dashboard-active { justify-content: flex-start; padding-top: 40px; }

#main-title { 
  font-size:48px; font-weight: 800; color:#fff; text-shadow:0 0 20px rgba(169,83,236,0.8); 
  margin-bottom:20px; text-align:center; cursor:pointer; transition: 0.3s;
  letter-spacing: 4px;
}
#main-title:hover { transform: scale(1.05); text-shadow: 0 0 30px rgba(169,83,236,1); }

/* Container UI adattivo */
#ui { width:100%; max-width:1100px; display:none; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Login & Form */
.login-header h2 { font-size:26px; color:#fff; margin-bottom:25px; text-align: center; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; margin-bottom:8px; color:#c9b6e6; font-size: 13px; text-transform: uppercase; }
.form-group input {
  width:100%; padding:14px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff; font-size:15px;
  transition:0.2s;
}
.form-group input:focus { outline:none; border-color:#a953ec; box-shadow:0 0 10px rgba(169,83,236,0.3); }

.btn { width:100%; padding:16px; background:#a953ec; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; }
.btn:hover { background: #bc76f0; transform:translateY(-2px); box-shadow:0 8px 20px rgba(169,83,236,0.4); }

.social-btn {
  width: 100%; display:flex; align-items:center; justify-content:center; gap:10px; background:#5865F2; color:white;
  border:none; padding:14px; border-radius:10px; cursor:pointer; font-weight:bold; transition:0.2s;
}

/* Dashboard Layout Adattivo */
.pt-header { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; }
.pt-head-right { display:flex; gap:12px; align-items:center; }

.icon-btn { 
    background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:inherit; 
    padding:10px 15px; border-radius:12px; cursor:pointer; display: flex; align-items: center; gap: 8px;
}
.icon-btn:hover { background: rgba(255,255,255,0.12); }

.platform-body { 
    width:100%; display:grid; 
    grid-template-columns: 250px 1fr; /* Sidebar fissa su desktop */
    gap:25px; 
}

/* Responsive: su mobile la grid diventa una colonna sola */
@media (max-width: 850px) {
    .platform-body { grid-template-columns: 1fr; }
    .pt-aside { display: none; } /* La sidebar la gestiremo col menu a comparsa poi */
}

.pt-card { background:rgba(255,255,255,0.03); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.08); padding:20px; border-radius:20px; }

/* Navigazione Sidebar */
.pt-nav { display:flex; flex-direction:column; gap:10px; }
.tab-btn { 
    background:transparent; border:1px solid rgba(255,255,255,0.05); color:#ccc; 
    padding:14px; border-radius:12px; text-align:left; cursor:pointer; transition: 0.2s;
}
.tab-btn.active { background:rgba(169,83,236,0.15); color:#fff; border-color:#a953ec; }

/* Toast/Notifiche */
.pt-toast{ position:fixed; right:20px; bottom:20px; background:#a953ec; color:white; padding:12px 20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); opacity:0; transform:translateY(20px); transition:0.3s; z-index:9999; }
.pt-toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="main-title">LA TAVERNA</div>
<div id="ui"></div>

<script type="module">
// --- IMPORTAZIONE MODULI ESTERNI (Assicurati che i file esistano!) ---
import { renderAIChat } from './src/ui/components/aichatpanel.js';

const uiContainer = document.getElementById('ui');
const mainTitle = document.getElementById('main-title');

const translations = {
    it: { vox: "Chat Vocale", exit: "Esci", welcome: "Benvenuto", dash: "Dashboard", npc: "Personaggi", notes: "Note" },
    en: { vox: "Voice Chat", exit: "Logout", welcome: "Welcome", dash: "Dashboard", npc: "NPCs", notes: "Notes" }
};
let currentLang = 'it';
const t = (key) => translations[currentLang][key];

// --- FUNZIONE LOGIN ---
function renderLogin() {
  mainTitle.style.display = "none";
  uiContainer.style.display = "block";
  uiContainer.innerHTML = `
    <div style="max-width: 400px; margin: 0 auto;">
        <div class="login-header"><h2>Entra nella Taverna</h2></div>
        <form id="login-form">
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="latua@email.com" required /></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" required /></div>
            <button type="submit" class="btn">Accedi</button>
            <div style="text-align:center; margin: 20px 0; color: #888;">oppure</div>
            <button type="button" class="social-btn" id="discord-login">Login con Discord</button>
        </form>
    </div>
  `;

  document.getElementById('login-form').onsubmit = e => {
    e.preventDefault();
    showPlatform({ email: document.getElementById('email').value, username: "Viandante" });
  };
}

// --- FUNZIONE DASHBOARD (L'ANIMA DEL SITO) ---
function showPlatform(user) {
  document.body.classList.add('dashboard-active');
  uiContainer.innerHTML = `
    <header class="pt-header">
      <div class="pt-head-left">
        <h2 style="font-size: 24px;">${t('welcome')}, <span style="color:#a953ec;">${user.username}</span></h2>
        <div style="font-size:13px; color:#aaa;">Esplora i segreti della tua campagna</div>
      </div>
      <div class="pt-head-right">
        <button class="icon-btn" title="${t('vox')}">🎧 <span>${t('vox')}</span></button>
        <button id="logout-btn" class="icon-btn" style="color:#ff4444;">✕</button>
      </div>
    </header>

    <div class="platform-body">
      <aside class="pt-aside">
        <div class="pt-card" style="margin-bottom: 15px; display:flex; align-items:center; gap:12px;">
            <div style="width:40px; height:40px; border-radius:8px; background:#a953ec; display:flex; align-items:center; justify-content:center; font-weight:bold;">${user.username[0]}</div>
            <div><div style="font-size:14px; font-weight:bold;">${user.username}</div><div style="font-size:11px; color:#888;">Online</div></div>
        </div>
        <nav class="pt-nav">
          <button class="tab-btn active">🏠 ${t('dash')}</button>
          <button class="tab-btn">📝 ${t('notes')}</button>
          <button class="tab-btn">👥 ${t('npc')}</button>
          <button class="tab-btn">⚙️ Impostazioni</button>
        </nav>
      </aside>

      <main class="pt-main">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="pt-card">
                <h3>Attività Recenti</h3>
                <p style="color:#888; margin-top:10px; font-size:14px;">Nessuna nuova notifica. La sessione è pronta per iniziare.</p>
            </div>
            
            <div id="ai-chat-container"></div>
        </div>
      </main>
    </div>
  `;

  // Carichiamo il componente AI Chat dal tuo file esterno
  const aiContainer = document.getElementById('ai-chat-container');
  if (renderAIChat) {
      renderAIChat(aiContainer, t);
  }

  // Bottone Logout
  document.getElementById('logout-btn').onclick = () => location.reload();
}

// Inizio: Il clic sul Titolo attiva il Login
mainTitle.onclick = renderLogin;
</script>
</body>
</html>
