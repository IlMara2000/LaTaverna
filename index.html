<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LA TAVERNA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- TEMA E VARIABILI --- */
:root {
  --bg-deep: #0a0a0c;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-bg: rgba(22, 22, 26, 0.98);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

html, body { height: 100%; background-color: var(--bg-deep); }

body {
  background-image: radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.1), transparent 40%);
  background-attachment: fixed;
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top) 20px 40px 20px;
  transition: all 0.5s ease;
}

body.dashboard-active { justify-content: flex-start; padding-top: 60px; }

#main-title-btn { 
  background: rgba(255,255,255,0.01);
  border: 1px solid var(--border-color);
  padding: 20px 40px;
  border-radius: 20px;
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 800;
  color: #fff; 
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 3px;
  text-shadow: 0 0 15px rgba(169, 83, 236, 0.6);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

#ui { width: 100%; max-width: 1000px; display: none; }

/* FIX MENU E OVERLAY */
.sidebar-overlay { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background: rgba(0,0,0,0.7); 
    backdrop-filter: blur(4px);
    display: none; 
    z-index: 998; /* Sotto la sidebar */
}
.sidebar-overlay.show { display: block; }

.pt-aside { 
    z-index: 1000 !important; /* Sopra l'overlay */
    pointer-events: auto !important;
}

/* Form Login */
.login-card { background: var(--glass-bg); border: 1px solid var(--border-color); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; margin: 0 auto; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
.form-group input { width: 100%; padding: 16px; background: #000; border: 1px solid var(--border-color); border-radius: 12px; color: #fff; }
.btn-primary { width: 100%; padding: 16px; background: var(--accent-purple); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; }
.lang-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
.lang-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); }
</style>
</head>
<body>

<button id="main-title-btn">LA TAVERNA</button>
<div class="sidebar-overlay" id="overlay"></div>
<div id="ui"></div>

<script type="module">
import { renderLayout } from './src/ui/components/layout.js';
import { renderSidebar } from './src/ui/components/sidebar.js';
import { renderAIChat } from './src/ui/components/aichatpanel.js';

const translations = {
    it: { 
        loginTitle: "Accedi", email: "EMAIL", pass: "PASSWORD", enter: "Entra", discord: "Accedi con Discord", 
        noAccount: "Non hai un account?", register: "Registrati", exit: "Esci", dash: "Dashboard", 
        notes: "Note", npc: "Personaggi", settings: "Opzioni", voxChat: "Chat Vocale", 
        welcome: "Viandante", activity: "Attività", loading: "Caricamento...",
        // CHIAVI PER AICHATPANEL.JS - Devono corrispondere a quelle usate nel componente
        aiTitle: "T.AIverna", 
        aiPlaceholder: "Inizia a scrivere per chiedere consigli sulla tua campagna...", 
        aiInput: "Chiedi alla T.AI..."
    },
    en: { 
        loginTitle: "Login", email: "EMAIL", pass: "PASSWORD", enter: "Enter", discord: "Login with Discord", 
        noAccount: "No account?", register: "Register", exit: "Logout", dash: "Dashboard", 
        notes: "Notes", npc: "NPCs", settings: "Settings", voxChat: "Voice Chat", 
        welcome: "Traveler", activity: "Activity", loading: "Loading...",
        aiTitle: "T.AIvern", 
        aiPlaceholder: "Start typing to ask for advice...", 
        aiInput: "Ask the T.AI..."
    }
};

let currentLang = localStorage.getItem('taverna_lang') || 'it';
const t = (key) => translations[currentLang][key] || key;

function renderLogin() {
    const mainBtn = document.getElementById('main-title-btn');
    if(mainBtn) mainBtn.style.display = "none";
    
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    ui.innerHTML = `
        <div class="login-card">
            <h2 style="text-align:center; margin-bottom:30px;">${t('loginTitle')}</h2>
            <form id="login-form">
                <div class="form-group"><label>${t('email')}</label><input type="email" id="email" required></div>
                <div class="form-group"><label>${t('pass')}</label><input type="password" id="pw" required></div>
                <button type="submit" class="btn-primary">${t('enter')}</button>
            </form>
            <div style="margin-top:25px; text-align:center;">
                ${t('noAccount')} <a href="#" id="to-register" style="color:var(--accent-purple); text-decoration:none;">${t('register')}</a>
            </div>
            <div style="margin-top:30px; display:flex; justify-content:center; gap:10px;">
                <button class="lang-btn ${currentLang==='it'?'active':''}" onclick="changeLang('it')">IT</button>
                <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="changeLang('en')">EN</button>
            </div>
        </div>
    `;
    
    document.getElementById('login-form').onsubmit = (e) => {
        e.preventDefault();
        const user = { username: t('welcome'), email: document.getElementById('email').value };
        localStorage.setItem('taverna_session', JSON.stringify({user, expiry: Date.now() + 86400000}));
        showPlatform(user);
    };

    document.getElementById('to-register').onclick = async (e) => {
        e.preventDefault();
        const { renderRegister } = await import('./register.js');
        renderRegister(ui, t, renderLogin);
    };
}

function showPlatform(user) {
    document.body.classList.add('dashboard-active');
    const mainBtn = document.getElementById('main-title-btn');
    if(mainBtn) mainBtn.style.display = "none";
    
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    
    renderLayout(ui, user, t, () => {
        localStorage.removeItem('taverna_session');
        location.reload();
    });
    
    let sidebarWrapper = document.getElementById('sidebar-wrapper');
    if(!sidebarWrapper) {
        sidebarWrapper = document.createElement('div');
        sidebarWrapper.id = "sidebar-wrapper";
        document.body.appendChild(sidebarWrapper);
    }

    renderSidebar(sidebarWrapper, user, t, (target) => {
        closeMenu();
    }, currentLang, (lang) => window.changeLang(lang));

    const mainContent = document.getElementById('main-content');
    if (mainContent) renderAIChat(mainContent, t);

    const overlay = document.getElementById('overlay');
    const closeMenu = () => {
        const sidebar = document.getElementById('sidebar');
        if(sidebar) sidebar.classList.remove('open');
        overlay.classList.remove('show');
    };

    overlay.onclick = closeMenu;

    // Listener globale per apertura menu
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('#open-menu');
        if(btn) {
            const sidebar = document.getElementById('sidebar');
            if(sidebar) {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            }
        }
    });
}

window.changeLang = (lang) => {
    localStorage.setItem('taverna_lang', lang);
    location.reload(); 
};

// --- Gestione Avvio ---
const session = localStorage.getItem('taverna_session');
if (session) {
    const data = JSON.parse(session);
    if (Date.now() < data.expiry) showPlatform(data.user);
    else {
        localStorage.removeItem('taverna_session');
        document.getElementById('main-title-btn').onclick = renderLogin;
    }
} else {
    document.getElementById('main-title-btn').onclick = renderLogin;
}
</script>
</body>
</html>
