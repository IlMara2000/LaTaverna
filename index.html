<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#05020a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>LA TAVERNA 🍷</title>
    
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/logo.png">

    <link rel="stylesheet" href="/src/styles/global.css">

    <style>
        :root { 
            --bg: #05020a; 
            --amethyst: #7b2cbf;
            --amethyst-bright: #9d4ede; 
            --amethyst-glow: rgba(157, 78, 221, 0.5);
        }

        html, body { 
            background-color: var(--bg) !important; 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden;
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #ui { width: 100%; height: 100%; position: relative; }

        /* LOADER PULSANTE */
        #app-loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; background: var(--bg);
            position: fixed; top: 0; left: 0; z-index: 10000;
        }

        .pulse-logo {
            width: 80px;
            animation: pulse 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 15px var(--amethyst-glow));
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px var(--amethyst-bright)); }
            100% { transform: scale(0.95); opacity: 0.6; }
        }

        .fade-out { opacity: 0; pointer-events: none; transition: 0.5s; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    
    <div id="ui">
        <div id="app-loader">
            <img src="/assets/logo.png" class="pulse-logo" alt="Caricamento...">
            <p style="margin-top: 20px; font-size: 10px; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase;">
                Chiamando l'oste...
            </p>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        document.body.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
