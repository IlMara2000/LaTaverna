<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#0f0617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>LA TAVERNA</title>

    <style>
        /* [I TUOI STILI RIMANGONO INVARIATI] */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; background:#0f0617; overflow-x:hidden; }
        body {
            min-height:100vh; width:100%;
            background: radial-gradient(circle at 20% 30%,rgba(169,83,236,0.25),transparent 40%), radial-gradient(circle at 80% 70%,rgba(128,0,128,0.35),transparent 40%), linear-gradient(135deg,#0f0617,#1c0828,#260c35);
            background-attachment:fixed; display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            color:white; text-align:center; -webkit-font-smoothing:antialiased;
        }

        #ui { width:100%; max-width:400px; }

        #main-title {
            display:inline-flex; align-items:center; justify-content:center;
            font-size:32px; font-weight:800; letter-spacing:2px;
            padding:20px 45px; border-radius:20px;
            background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.15); color:white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(169,83,236,0.2);
            transition: all .5s ease; cursor:pointer;
        }

        /* Classe per nascondere il titolo quando l'app è pronta */
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.8); display: none !important; }
    </style>
</head>
<body>

    <div id="main-title">LA TAVERNA</div>

    <div id="ui"></div>

    <script type="module" src="/src/main.js"></script>

</body>
</html>
