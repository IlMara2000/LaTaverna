<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LA TAVERNA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0c;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-bg: rgba(22, 22, 26, 0.98);
  --card-bg: rgba(255, 255, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.1), transparent 40%), var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* Centra il tastone all'inizio */
  transition: all 0.5s ease;
}

/* Quando la dashboard è attiva, il body cambia allineamento */
body.dashboard-active {
  justify-content: flex-start;
  padding: 20px;
}

/* IL TASTONE - Centrato e Premium */
#main-title-btn { 
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border-color);
  padding: 24px 48px;
  border-radius: 20px;
  font-size: 32px;
  font-weight: 800;
  color: #fff; 
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  text-transform: uppercase;
  letter-spacing: 3px;
}
#main-title-btn:hover {
  transform: scale(1.05);
  border-color: var(--accent-purple);
  background: rgba(169, 83, 236, 0.05);
}

#ui { width: 100%; max-width: 1100px; display: none; margin: 0 auto; }

/* Dashboard Header & Cards */
.pt-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 0;
  width: 100%;
}

.icon-btn {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  color: #fff;
  padding: 14px;
  border-radius: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: 0.2s;
}
.icon-btn:hover { background: rgba(255,255,255,0.08); }

/* Grid Adattiva */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 25px;
  margin-top: 20px;
}

.pt-card { 
  background: var(--card-bg); 
  border: 1px solid var(--border-color); 
  border-radius: 28px; 
  padding: 30px;
  backdrop-filter: blur(10px);
}

/* Sidebar Estetica */
.pt-aside {
  position: fixed;
  top: 0; left: -320px; width: 300px; height: 100%;
  background: var(--glass-bg); backdrop-filter: blur(25px);
  z-index: 1000; padding: 80px 25px;
  border-right: 1px solid var(--border-color);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.pt-aside.open { transform: translateX(320px); }

.sidebar-overlay { 
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
  background: rgba(0,0,0,0.7); display: none; z-index: 999; 
}
.sidebar-overlay.show { display: block; }

/* Login Estetico */
.login-card { 
  background: var(--glass-bg); 
  border: 1px solid var(--border-color); 
  padding: 50px 40px; 
  border-radius: 32px; 
  width: 100%; max-width: 450px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

.form-group { margin-bottom: 25px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; }
.form-group input { 
  width: 100%; padding: 18px; background: rgba(0,0,0,0.3); 
  border: 1px solid var(--border-color); border-radius: 16px; 
  color: #fff; font-size: 16px; 
}

.btn-primary { 
  width: 100%; padding: 18px; background: var(--accent-purple); 
  border: none; border-radius: 16px; color: #fff; 
  font-weight: 700; cursor: pointer; font-size: 16px;
  box-shadow: 0 10px 20px rgba(169, 83, 236, 0.2);
}

.tab-btn { 
  background: transparent; border: none; color: var(--text-muted); 
  padding: 18px; border-radius: 16px; text-align: left; 
  width: 100%; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
  font-size: 16px; cursor: pointer; transition: 0.2s;
}
.tab-btn.active { background: rgba(169, 83, 236, 0.1); color: var(--accent-purple); font-weight: 600; }

.lang-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 10px 18px; border-radius: 12px; cursor: pointer; }
.lang-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); background: rgba(169, 83, 236, 0.05); }
</style>
</head>
<body>

<button id="main-title-btn">LA TAVERNA</button>
<div class="sidebar-overlay" id="overlay"></div>
<div id="ui"></div>

<script type="module">
    import { renderLayout } from './src/ui/components/layout.js';
    import { renderSidebar } from './src/ui/components/sidebar.js';
    import { renderAIChat } from './src/ui/components/aichatpanel.js';

    const translations = {
        it: { loginTitle: "Accedi", email: "EMAIL", pass: "PASSWORD", enter: "Entra", discord: "Accedi con Discord", exit: "Esci", dash: "Dashboard", notes: "Note di Sessione", npc: "Lista NPC", settings: "Impostazioni", activity: "Attività Recenti", vox: "Chat Vocale", welcome: "Viandante" },
        en: { loginTitle: "Login", email: "EMAIL", pass: "PASSWORD", enter: "Enter", discord: "Discord Login", exit: "Logout", dash: "Dashboard", notes: "Session Notes", npc: "NPC List", settings: "Settings", activity: "Recent Activity", vox: "Voice Chat", welcome: "Traveler" }
    };

    let currentLang = localStorage.getItem('taverna_lang') || 'it';
    const t = (key) => translations[currentLang][key];

    function toggleMenu() {
        document.querySelector('.pt-aside')?.classList.toggle('open');
        document.getElementById('overlay')?.classList.toggle('show');
    }

    function renderLogin() {
        const ui = document.getElementById('ui');
        document.getElementById('main-title-btn').style.display = "none";
        ui.style.display = "block";
        ui.innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
                <div class="login-card">
                    <h2 style="text-align:center; margin-bottom:40px; font-size:32px; font-weight:800;">${t('loginTitle')}</h2>
                    <form id="login-form">
                        <div class="form-group"><label>${t('email')}</label><input type="email" id="email" required></div>
                        <div class="form-group"><label>${t('pass')}</label><input type="password" id="pw" required></div>
                        <button type="submit" class="btn-primary">${t('enter')}</button>
                    </form>
                    <div style="margin-top:30px; display:flex; justify-content:center; gap:12px;">
                        <button class="lang-btn ${currentLang==='it'?'active':''}" onclick="changeLanguage('it')">IT</button>
                        <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="changeLanguage('en')">EN</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const user = { username: "Francesco", email: document.getElementById('email').value };
            localStorage.setItem('taverna_session', JSON.stringify({user, expiry: Date.now() + 86400000}));
            showPlatform(user);
        };
    }

    function showPlatform(user) {
        document.body.classList.add('dashboard-active');
        document.getElementById('main-title-btn').style.display = "none";
        const ui = document.getElementById('ui');
        ui.style.display = "block";
        
        // Header con icona Cuffie (Voice Chat)
        ui.innerHTML = `
            <header class="pt-header">
                <button class="icon-btn" id="open-menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div style="display:flex; gap:15px;">
                    <button class="icon-btn" title="${t('vox')}">🎧 <span style="font-size:13px; font-weight:600;">${t('vox')}</span></button>
                    <button id="logout-btn" class="icon-btn" style="border-color:rgba(255,0,0,0.2); color:#ff5555;">${t('exit')}</button>
                </div>
            </header>

            <aside class="pt-aside">
                <div class="pt-card" style="padding:20px; margin-bottom:30px; background:rgba(255,255,255,0.05);">
                    <div style="font-weight:800; font-size:18px;">${user.username}</div>
                    <div style="font-size:12px; color:var(--text-muted);">${user.email}</div>
                </div>
                <nav>
                    <button class="tab-btn active">🏠 ${t('dash')}</button>
                    <button class="tab-btn">📝 ${t('notes')}</button>
                    <button class="tab-btn">👥 ${t('npc')}</button>
                    <button class="tab-btn">⚙️ ${t('settings')}</button>
                </nav>
            </aside>

            <main class="dashboard-grid">
                <div id="activity-panel"></div>
                <div id="ai-chat-container"></div>
            </main>
        `;

        // Inserimento componenti esterni
        const activityPanel = document.getElementById('activity-panel');
        activityPanel.innerHTML = `
            <div class="pt-card">
                <h3 style="margin-bottom:20px;">${t('activity')}</h3>
                <p style="color:var(--text-muted);">Benvenuto, Viandante Francesco. La Taverna è pronta.</p>
            </div>
        `;

        const aiContainer = document.getElementById('ai-chat-container');
        renderAIChat(aiContainer, t);

        document.getElementById('open-menu').onclick = toggleMenu;
        document.getElementById('overlay').onclick = toggleMenu;
        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('taverna_session');
            location.reload();
        };
    }

    window.changeLanguage = (l) => {
        localStorage.setItem('taverna_lang', l);
        location.reload();
    };

    const session = localStorage.getItem('taverna_session');
    if (session) {
        const data = JSON.parse(session);
        if (Date.now() < data.expiry) showPlatform(data.user);
        else renderLogin();
    } else {
        document.getElementById('main-title-btn').onclick = renderLogin;
    }
</script>
</body>
</html>
