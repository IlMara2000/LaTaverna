<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LA TAVERNA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0c;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-bg: rgba(22, 22, 26, 0.98);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.05), transparent 40%), var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 20px 40px 20px; 
}

/* Bottone Titolo Iniziale */
#main-title-btn { 
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-color);
  padding: 16px 32px;
  border-radius: 16px;
  font-size: 32px;
  font-weight: 800;
  color: #fff; 
  cursor: pointer;
}

#ui { width: 100%; max-width: 1000px; display: none; }

/* Stili per i componenti che verranno caricati */
.pt-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 40px; width: 100%; }
.icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; }
.pt-aside { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--glass-bg); backdrop-filter: blur(20px); z-index: 1000; padding: 60px 20px 20px 20px; border-right: 1px solid var(--border-color); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.pt-aside.open { transform: translateX(300px); }
.sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 999; }
.sidebar-overlay.show { display: block; }
.login-card { background: var(--glass-bg); border: 1px solid var(--border-color); padding: 40px 30px; border-radius: 24px; width: 100%; }
.form-group { margin-bottom: 25px; }
.form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
.form-group input { width: 100%; padding: 16px; background: #000; border: 1px solid var(--border-color); border-radius: 12px; color: #fff; }
.btn-primary { width: 100%; padding: 16px; background: var(--accent-purple); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; }
.btn-discord { width: 100%; padding: 16px; background: #5865F2; border: none; border-radius: 12px; color: #fff; font-weight: 700; margin-top: 15px; cursor: pointer; }
.pt-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
.tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 16px; border-radius: 12px; text-align: left; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
.tab-btn.active { background: rgba(169, 83, 236, 0.1); color: var(--accent-purple); font-weight: 600; }
.lang-selector { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
.lang-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
.lang-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); }
</style>
</head>
<body>

<button id="main-title-btn">LA TAVERNA</button>
<div class="sidebar-overlay" id="overlay"></div>
<div id="ui"></div>

<script type="module">
// Importiamo i componenti dalla cartella corretta
import { renderLayout } from './src/ui/components/layout.js';
import { renderSidebar } from './src/ui/components/sidebar.js';
import { renderAIChat } from './src/ui/components/aichatpanel.js';
// Importiamo anche la dashboard che avevamo creato prima
import { renderDashboard } from './dashboard.js'; 

const translations = {
    it: { loginTitle: "Accedi", email: "EMAIL", pass: "PASSWORD", enter: "Entra", discord: "Accedi con Discord", exit: "Esci", dash: "Dashboard", notes: "Note di Sessione", npc: "Lista NPC", settings: "Impostazioni", activity: "Attività Recenti", loading: "In caricamento...", welcome: "Viandante" },
    en: { loginTitle: "Login", email: "EMAIL", pass: "PASSWORD", enter: "Enter", discord: "Login with Discord", exit: "Logout", dash: "Dashboard", notes: "Session Notes", npc: "NPC List", settings: "Settings", activity: "Recent Activity", loading: "Loading...", welcome: "Traveler" }
};

let currentLang = localStorage.getItem('taverna_lang') || (navigator.language.startsWith('it') ? 'it' : 'en');

function t(key) { return translations[currentLang][key]; }

function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if(sidebar) sidebar.classList.toggle('open');
    if(overlay) overlay.classList.toggle('show');
}

function handleLogout() {
    localStorage.removeItem('taverna_session');
    location.reload();
}

function showPlatform(user) {
    document.getElementById('main-title-btn').style.display = "none";
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    
    // 1. Renderizziamo il Layout base
    renderLayout(ui, user, t, handleLogout);
    
    // 2. Renderizziamo la Sidebar (la mettiamo fuori dal contenitore UI per gestirla come fixed)
    const sidebarContainer = document.createElement('div');
    sidebarContainer.id = "sidebar-wrapper";
    document.body.appendChild(sidebarContainer);
    renderSidebar(sidebarContainer, user, t, (target) => {
        const mainContent = document.getElementById('main-content');
        if(target === 'dash') renderDashboard(mainContent, t);
        // Altri target (npc, notes) li aggiungeremo man mano
        toggleMenu();
    }, currentLang, (lang) => {
        localStorage.setItem('taverna_lang', lang);
        location.reload();
    });

    // 3. Carichiamo la Dashboard nel main-content per default
    const mainContent = document.getElementById('main-content');
    renderDashboard(mainContent, t);

    // 4. Aggiungiamo il pannello AI sotto la dashboard
    renderAIChat(mainContent, t);

    // Colleghiamo il tasto menu dell'header alla funzione toggle
    document.getElementById('open-menu').onclick = toggleMenu;
    document.getElementById('overlay').onclick = toggleMenu;
}

// Logica di Login semplificata (come prima)
function renderLogin() {
    document.getElementById('main-title-btn').style.display = "none";
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    ui.innerHTML = `
        <div class="login-card">
            <h2 style="text-align:center; margin-bottom:30px; font-size:28px;">${t('loginTitle')}</h2>
            <form id="login-form">
                <div class="form-group"><label>${t('email')}</label><input type="email" id="email" required></div>
                <div class="form-group"><label>${t('pass')}</label><input type="password" id="pw" required></div>
                <button type="submit" class="btn-primary">${t('enter')}</button>
            </form>
        </div>
    `;
    document.getElementById('login-form').onsubmit = (e) => {
        e.preventDefault();
        const user = { username: "Francesco", email: document.getElementById('email').value };
        localStorage.setItem('taverna_session', JSON.stringify({user, expiry: Date.now() + 86400000}));
        showPlatform(user);
    };
}

const sessionData = localStorage.getItem('taverna_session');
if (sessionData) {
    const session = JSON.parse(sessionData);
    showPlatform(session.user);
} else {
    document.getElementById('main-title-btn').onclick = renderLogin;
}
</script>
</body>
</html>
