<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LA TAVERNA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
/* Reset e Variabili Color Palette */
:root {
  --bg-deep: #0a0a0c;
  --bg-accent: #120018;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-bg: rgba(22, 22, 26, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: 
    radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.12), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(124, 58, 237, 0.08), transparent 40%),
    var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

/* Titolo con effetto Glow moderno */
#main-title { 
  font-size: 42px; 
  font-weight: 800;
  letter-spacing: -1.5px;
  color: #fff; 
  text-shadow: 0 0 25px rgba(169,83,236,0.4); 
  margin-bottom: 30px; 
  text-align: center; 
  cursor: pointer;
  transition: transform 0.3s ease;
}
#main-title:hover { transform: scale(1.02); }

/* Container UI - Più simile a una dashboard SaaS */
#ui {
  width: 100%;
  max-width: 1000px;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* Form Styling */
.login-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 30px; text-align: center; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
.form-group input {
  width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border-color); 
  background: rgba(0, 0, 0, 0.2); color: #fff; font-size: 15px; transition: 0.3s;
}
.form-group input:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(169, 83, 236, 0.2); }

/* Button Styling */
.btn { 
  width: 100%; padding: 14px; background: var(--accent-purple); color: white; border: none; 
  border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; 
}
.btn:hover { background: #9333ea; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(169,83,236,0.3); }

/* Discord Button */
.social-btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; 
  background: #5865F2; color: white; border: none; padding: 14px; border-radius: 10px; 
  cursor: pointer; font-weight: 700; transition: 0.3s;
}
.social-btn:hover { background: #4752c4; transform: translateY(-1px); }

/* Dashboard Layout Refined */
.platform-body { display: grid; grid-template-columns: 240px 1fr; gap: 30px; margin-top: 20px; }
.pt-aside { display: flex; flex-direction: column; gap: 20px; }
.pt-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; }

/* Navigation in Dashboard */
.tab-btn { 
  background: transparent; border: none; color: var(--text-muted); padding: 12px; 
  border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 500;
}
.tab-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
.tab-btn.active { background: rgba(169, 83, 236, 0.1); color: var(--accent-purple); border-left: 3px solid var(--accent-purple); border-radius: 4px 8px 8px 4px; }

/* Activity Feed */
.pt-activity li { 
  padding: 12px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; 
}

/* Toast */
.pt-toast { 
  position: fixed; right: 24px; bottom: 24px; background: #fff; color: #000; 
  padding: 16px 24px; border-radius: 12px; font-weight: 600; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
}
</style>
</head>
<body>

<div id="main-title">LA TAVERNA</div>
<div id="ui" style="display:none;"></div>

<script type="module">

</body>
</html>
