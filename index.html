<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LA TAVERNA</title>

<style>

* { margin: -1px; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

body {
  background:
    radial-gradient(circle at 20% 30%, rgba(169,83,236,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(128,0,128,0.35), transparent 40%),
    linear-gradient(135deg,#0f0617,#1c0828,#260c35);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:white;
  text-align:center;
}

/* ===== NUOVO BOTTONE GLASS ===== */

#main-title {

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:38px;
  font-weight:800;
  letter-spacing:2px;

  padding:18px 40px;

  border-radius:18px;

  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  border:1px solid rgba(255,255,255,0.15);

  color:white;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 12px rgba(169,83,236,0.3);

  cursor:pointer;

  transition:all .25s ease;

  margin-bottom:30px;

}

#main-title:hover{

  transform:translateY(-4px) scale(1.04);

  background:rgba(169,83,236,0.12);

  box-shadow:
    0 20px 60px rgba(169,83,236,0.45),
    inset 0 0 20px rgba(169,83,236,0.6);

}


/* ===== LOGIN ===== */

.login-header h2 { font-size:22px; color:#ccc; margin-bottom:25px; }

.form-group { margin-bottom:18px; text-align:left; }

.form-group label { display:block; margin-bottom:6px; color:#ddd; }

.form-group input {
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:none;
  background:#2c1e4a;
  color:#fff;
  font-size:15px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
  transition:0.2s;
}

.form-group input:focus {
  outline:none;
  box-shadow:0 0 6px #a953ec;
  border:2px solid #a953ec;
}

.checkbox-group {
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  margin-bottom:20px;
}

.checkbox-group input[type="checkbox"] { width:18px; height:18px; }

.btn {
  width:100%;
  padding:14px;
  background:#a953ec;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover {
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(169,83,236,0.4);
}

.divider {
  text-align:center;
  margin:20px 0;
  position:relative;
}

.divider::before,.divider::after {
  content:"";
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:#ddd;
}

.divider::before { left:0; }
.divider::after { right:0; }

.divider span {
  background: transparent;
  padding:0 10px;
  color:#ccc;
  font-size:14px;
}

.social-login {
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.social-btn {

  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  background:#5865F2;
  color:white;

  border:none;

  padding:12px 16px;

  border-radius:8px;

  cursor:pointer;

  font-weight:bold;

  font-size:15px;

  transition:0.2s;
}

.social-btn:hover {

  background:#4752c4;

  transform:translateY(-2px);

  box-shadow:0 5px 15px rgba(88,101,242,0.4);

}

.footer {

  text-align:center;

  margin-top:20px;

  font-size:14px;

  color:#ccc;

}

.footer a {

  color:#a953ec;

  text-decoration:none;

  cursor:pointer;

}

.footer a:hover { text-decoration:underline; }

/* Dashboard */

.pt-header{
  width:100%;
  max-width:900px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.pt-head-left h2{ margin:0; font-size:20px; }

.pt-sub{
  color:#c9b6e6;
  font-size:13px;
  margin-top:4px;
  opacity:0.9;
}

.pt-head-right{
  display:flex;
  gap:8px;
  align-items:center;
}

.icon-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.06);
  color:inherit;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.btn.small{
  padding:8px 10px;
  font-size:14px;
  border-radius:8px;
}

/* layout */

.platform-body{
  width:100%;
  max-width:900px;
  display:flex;
  gap:20px;
  margin-top:18px;
}

.pt-aside{
  flex:0 0 220px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.pt-main{
  flex:1;
  min-height:320px;
}

/* profile */

.pt-card.pt-profile{
  display:flex;
  gap:10px;
  align-items:center;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  padding:12px;
  border-radius:8px;
}

.pt-avatar{
  width:48px;
  height:48px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#a953ec,#7a4cc1);
  font-weight:700;
  font-size:18px;
  color:white;
  box-shadow:0 4px 14px rgba(169,83,236,0.15);
}

.pt-name{ font-weight:700; }

.pt-email{
  font-size:12px;
  color:#c9b6e6;
  opacity:0.9;
}

/* nav */

.pt-nav{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:8px;
}

.pt-nav .tab-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,0.04);
  color:inherit;
  padding:10px;
  border-radius:8px;
  text-align:left;
  cursor:pointer;
}

.pt-nav .tab-btn.active{
  background:linear-gradient(90deg, rgba(169,83,236,0.18), rgba(169,83,236,0.06));
  box-shadow:0 6px 18px rgba(169,83,236,0.06);
}

/* quick actions */

.pt-quick{
  margin-top:auto;
  background:rgba(255,255,255,0.02);
  padding:10px;
  border-radius:8px;
}

.pt-quick-title{
  font-size:13px;
  color:#c9b6e6;
  margin-bottom:8px;
}

.pt-quick-btn{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#6f3bd6;
  color:white;
  cursor:pointer;
}

/* main */

.pt-section{
  margin-bottom:18px;
  padding:12px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  border-radius:8px;
}

.pt-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
}

.pt-stat{
  padding:12px;
  border-radius:8px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
}

.pt-stat.wide{ grid-column: span 2; }

.pt-stat h4{
  margin:0 0 8px 0;
  font-size:14px;
  color:#dcd0f9;
}

.pt-stat-value{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
}

.pt-stat-sub{
  font-size:12px;
  color:#c9b6e6;
}

/* progress */

.pt-progress{
  background:rgba(255,255,255,0.03);
  border-radius:8px;
  height:12px;
  overflow:hidden;
}

.pt-progress-bar{
  height:100%;
  background:linear-gradient(90deg,#a953ec,#7a4cc1);
}

/* activity */

.pt-activity{
  list-style:none;
  padding:0;
  margin:0;
}

.pt-activity li{
  padding:10px 0;
  border-bottom:1px dashed rgba(255,255,255,0.03);
}

.muted{
  color:#c9b6e6;
  font-size:12px;
  margin-left:8px;
  opacity:0.9;
}

/* contacts */

.pt-contacts{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.pt-contact{
  padding:8px;
  background:rgba(255,255,255,0.02);
  border-radius:6px;
}

/* toast */

.pt-toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#222;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
  opacity:0;
  transform:translateY(8px);
  transition:all .25s ease;
  z-index:9999;
}

.pt-toast.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div id="main-title">LA TAVERNA</div>
<div id="ui" style="display:none;"></div>

<script type="module">

const CONFIG = {
  DISCORD_CLIENT_ID: '1478809987357868083',
  DISCORD_REDIRECT_URI: 'https://nyc.cloud.appwrite.io/v1/account/sessions/oauth2/callback/discord/69a85edc001553a4b931'
};

const uiContainer = document.getElementById('ui');
const mainTitle = document.getElementById('main-title');

/* TUTTO IL TUO JAVASCRIPT È IDENTICO */

function renderLogin() {
  document.title = "LaTaverna - Login";
  uiContainer.style.display = "block";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Login</h2></div>
    <form id="login-form">
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Inserisci la tua password" required /></div>
      <button type="submit" class="btn" id="login-btn">Accedi</button>
      <div class="divider"><span>Oppure</span></div>
      <div class="social-login">
        <button type="button" class="social-btn" id="discord-login">
          Login con Discord
        </button>
      </div>
      <div class="footer">Non hai un account? <a id="toRegister">Registrati</a></div>
    </form>
  `;

  document.getElementById('toRegister').onclick = e => { e.preventDefault(); renderRegister(); };

  document.getElementById('discord-login').onclick = () => {
    const url = `https://discord.com/oauth2/authorize?client_id=${CONFIG.DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.DISCORD_REDIRECT_URI)}&response_type=code&scope=identify%20email`;
    window.location.href = url;
  };

  document.getElementById('login-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: "Utente" };
    showPlatform(user);
  };
}

function renderRegister() {
  document.title = "LaTaverna - Registrati";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Registrati</h2></div>
    <form id="register-form">
      <div class="form-group"><label for="username">Username</label><input type="text" id="username" placeholder="Inserisci il tuo username" required /></div>
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Inserisci la tua password" required /></div>
      <div class="checkbox-group"><input type="checkbox" id="gdpr"/><label for="gdpr">Accetto il GDPR</label></div>
      <button type="submit" class="btn" id="register-btn">Registrati</button>
      <div class="footer">Hai già un account? <a id="toLogin">Login</a></div>
    </form>
  `;

  document.getElementById('toLogin').onclick = e => { e.preventDefault(); renderLogin(); };

  document.getElementById('register-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: document.getElementById('username').value };
    showPlatform(user);
  };
}

/* resto JS IDENTICO */

mainTitle.onclick = () => {
  mainTitle.style.display = "none";
  renderLogin();
};

</script>

</body>
</html>
