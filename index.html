<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <meta name="theme-color" content="#0f0617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="La Taverna">
    
    <title>LA TAVERNA</title>

    <link rel="manifest" href="/manifest.json">

    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/favicon.ico">
    
    <link rel="stylesheet" href="/src/style.css">

    <style>
        /* FIX PRE-CARICAMENTO: impedisce flash bianchi e bande nere */
        :root { --bg: #0f0617; }
        html, body { 
            background-color: var(--bg) !important; 
            margin: 0; 
            padding: 0; 
            height: 100svh; 
            width: 100vw;
            overflow: hidden;
            position: fixed; /* Blocca lo scroll del body che causa glitch visivi */
        }
        #ui { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="ui"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
