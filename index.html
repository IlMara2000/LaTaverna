<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="theme-color" content="#0f0617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>LA TAVERNA</title>

    <link rel="stylesheet" href="./style.css?v=2">

    <style>
        /* Reset critico per bloccare zoom e interazioni browser indesiderate */
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* Blocca il doppio tocco per lo zoom */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* Blocca lo scroll orizzontale */
            background-color: #0f0617;
            user-select: none; /* Impedisce la selezione del testo involontaria */
            -webkit-user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Forza lo scroll solo verticale e fluido */
            overflow-y: auto;
            overscroll-behavior-y: contain; 
        }

        .hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.8); 
            display: none !important; 
        }

        #ui {
            width: 100%;
            max-width: 400px;
            padding-bottom: env(safe-area-inset-bottom); /* Spazio per le gesture di iPhone */
        }
    </style>
</head>
<body>

    <button id="main-title" class="hero-btn">LA TAVERNA</button>

    <div id="ui"></div>

    <script type="module" src="/src/main.js?v=2"></script>

</body>
</html>
