<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LA TAVERNA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0c;
  --accent-purple: #a953ec;
  --text-main: #f4f4f5;
  --text-muted: #a1a1aa;
  --border-color: rgba(255, 255, 255, 0.08);
  --glass-bg: rgba(22, 22, 26, 0.98);
}

/* Reset e Base */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
  background: radial-gradient(circle at 10% 10%, rgba(169, 83, 236, 0.05), transparent 40%), var(--bg-deep);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  /* Centratura verticale e orizzontale del contenuto iniziale */
  justify-content: center; 
  align-items: center;
  padding: 20px;
}

/* Layout Adattivo quando la UI è attiva */
body.dashboard-active {
  justify-content: flex-start; /* Torna in alto quando entri nel gioco */
  padding-top: env(safe-area-inset-top);
}

/* TASTONE INIZIALE - Ora perfettamente centrato */
#main-title-btn { 
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-color);
  padding: 20px 40px;
  border-radius: 20px;
  font-size: clamp(24px, 5vw, 40px); /* Dimensione dinamica */
  font-weight: 800;
  color: #fff; 
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-transform: uppercase;
  letter-spacing: 2px;
}
#main-title-btn:hover { 
  background: rgba(169, 83, 236, 0.1); 
  border-color: var(--accent-purple);
  transform: translateY(-5px);
}

#ui { width: 100%; max-width: 1200px; display: none; margin-top: 40px; }

/* Dashboard Header */
.pt-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  width: 100%;
}

/* Sidebar Responsive */
.pt-aside {
  position: fixed;
  top: 0; left: -300px; width: 280px; height: 100%;
  background: var(--glass-bg); backdrop-filter: blur(20px);
  z-index: 1000; padding: 60px 20px;
  border-right: 1px solid var(--border-color);
  transition: transform 0.3s ease;
}
.pt-aside.open { transform: translateX(300px); }

.sidebar-overlay { 
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
  background: rgba(0,0,0,0.7); display: none; z-index: 999; 
}
.sidebar-overlay.show { display: block; }

/* Grid Adattiva per la Dashboard */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  width: 100%;
  margin-top: 20px;
}

.pt-card { 
  background: rgba(255,255,255,0.03); 
  border: 1px solid var(--border-color); 
  border-radius: 24px; 
  padding: 25px;
  height: 100%;
}

/* Form Login */
.login-card { 
  max-width: 450px; margin: 0 auto;
  background: var(--glass-bg); border: 1px solid var(--border-color); 
  padding: 40px; border-radius: 30px; 
}

.form-group input { 
  width: 100%; padding: 18px; background: #000; 
  border: 1px solid var(--border-color); border-radius: 15px; 
  color: #fff; margin-top: 8px;
}

.btn-primary { 
  width: 100%; padding: 18px; background: var(--accent-purple); 
  border: none; border-radius: 15px; color: #fff; 
  font-weight: 700; cursor: pointer; margin-top: 10px;
}

.tab-btn { 
  background: transparent; border: none; color: var(--text-muted); 
  padding: 16px; border-radius: 12px; text-align: left; 
  width: 100%; display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.tab-btn.active { background: rgba(169, 83, 236, 0.1); color: var(--accent-purple); }

.lang-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
.lang-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); }

/* Utility icone */
.icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 12px; cursor: pointer; }
</style>
</head>
<body>

<button id="main-title-btn">LA TAVERNA</button>

<div class="sidebar-overlay" id="overlay"></div>
<div id="ui"></div>

<script src="./src/ui/components/layout.js"></script>
<script src="./src/ui/components/sidebar.js"></script>
<script src="./src/ui/components/aichatpanel.js"></script>
<script>
const translations = {
    it: { loginTitle: "Accedi", email: "EMAIL", pass: "PASSWORD", enter: "Entra", discord: "Discord Login", exit: "Esci", dash: "Dashboard", notes: "Note", npc: "Personaggi", settings: "Opzioni", activity: "Attività Recenti", welcome: "Viandante" },
    en: { loginTitle: "Login", email: "EMAIL", pass: "PASSWORD", enter: "Enter", discord: "Discord Login", exit: "Logout", dash: "Dashboard", notes: "Notes", npc: "NPCs", settings: "Settings", activity: "Recent Activity", welcome: "Traveler" }
};

let currentLang = localStorage.getItem('taverna_lang') || 'it';
const t = (key) => translations[currentLang][key];

function toggleMenu() {
    document.querySelector('.pt-aside').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

function renderLogin() {
    document.body.classList.remove('dashboard-active');
    document.getElementById('main-title-btn').style.display = "none";
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    ui.innerHTML = `
        <div class="login-card">
            <h2 style="text-align:center; margin-bottom:30px; font-weight:800;">${t('loginTitle')}</h2>
            <form id="login-form">
                <div class="form-group"><label>${t('email')}</label><input type="email" id="email" required></div>
                <div class="form-group"><label>${t('pass')}</label><input type="password" id="pw" required></div>
                <button type="submit" class="btn-primary">${t('enter')}</button>
            </form>
            <div style="margin-top:25px; display:flex; justify-content:center; gap:10px;">
                <button class="lang-btn ${currentLang==='it'?'active':''}" onclick="changeLang('it')">IT</button>
                <button class="lang-btn ${currentLang==='en'?'active':''}" onclick="changeLang('en')">EN</button>
            </div>
        </div>
    `;
    
    document.getElementById('login-form').onsubmit = (e) => {
        e.preventDefault();
        const user = { username: t('welcome'), email: document.getElementById('email').value };
        localStorage.setItem('taverna_session', JSON.stringify({user, expiry: Date.now() + 86400000}));
        showPlatform(user);
    };
}

function showPlatform(user) {
    document.body.classList.add('dashboard-active'); // Cambia il layout in adattivo
    document.getElementById('main-title-btn').style.display = "none";
    const ui = document.getElementById('ui');
    ui.style.display = "block";
    
    // Struttura adattiva
    ui.innerHTML = `
        <header class="pt-header">
            <button class="icon-btn" id="open-menu">☰</button>
            <div style="display:flex; gap:12px;">
                <button id="logout-btn" class="icon-btn">✕</button>
            </div>
        </header>

        <aside class="pt-aside">
            <div class="pt-card" style="padding:15px; margin-bottom:20px; background:rgba(255,255,255,0.05);">
                <div style="font-weight:800;">${user.username}</div>
                <div style="font-size:11px; color:var(--text-muted);">${user.email}</div>
            </div>
            <nav>
                <button class="tab-btn active">🏠 ${t('dash')}</button>
                <button class="tab-btn">📝 ${t('notes')}</button>
                <button class="tab-btn">👥 ${t('npc')}</button>
            </nav>
        </aside>

        <main class="dashboard-grid">
            <div class="pt-card">
                <h3>${t('activity')}</h3>
                <p style="color:var(--text-muted); margin-top:10px;">Benvenuto nella Taverna...</p>
            </div>
            <div class="pt-card" id="ai-placeholder">
                <h3 style="color:var(--accent-purple)">AI Assistant</h3>
                <p style="font-size:14px; color:var(--text-muted);">In attesa di istruzioni...</p>
            </div>
        </main>
    `;

    document.getElementById('open-menu').onclick = toggleMenu;
    document.getElementById('overlay').onclick = toggleMenu;
    document.getElementById('logout-btn').onclick = () => {
        localStorage.removeItem('taverna_session');
        location.reload();
    };
}

window.changeLang = (l) => {
    localStorage.setItem('taverna_lang', l);
    location.reload();
};

// Inizializzazione
const sessionData = localStorage.getItem('taverna_session');
const mainBtn = document.getElementById('main-title-btn');

if (sessionData) {
    const session = JSON.parse(sessionData);
    if (Date.now() < session.expiry) {
        showPlatform(session.user);
    } else {
        localStorage.removeItem('taverna_session');
        mainBtn.onclick = renderLogin;
    }
} else {
    mainBtn.onclick = renderLogin;
}
</script>
</body>
</html>
