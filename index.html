<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <meta name="theme-color" content="#05010a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    
    <title>LA TAVERNA 🍷</title>
    
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="/src/styles/global.css">

    <style>
        /* Loader professionale ultra-rapido */
        #app-loader {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; width: 100%; background: #05010a;
            position: fixed; top: 0; left: 0; z-index: 999999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .pulse-logo {
            width: 90px;
            animation: amethystPulse 2s infinite ease-in-out;
        }

        @keyframes amethystPulse {
            0%, 100% { transform: scale(0.92); opacity: 0.6; filter: drop-shadow(0 0 10px rgba(157, 78, 221, 0.4)); }
            50% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 30px #9d4ede); }
        }
    </style>
</head>
<body>
    
    <div id="ui">
        <div id="navbar-container"></div>
        <div id="sidebar-container"></div>

        <main id="app"></main>

        <div id="app-loader">
            <img src="/assets/logo.png" class="pulse-logo" alt="La Taverna">
            <p style="margin-top:25px; font-size:10px; letter-spacing:4px; opacity:0.4; text-transform:uppercase; font-weight:700; font-family: 'Montserrat', sans-serif; color: white;">Entrando nella sala...</p>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        // Blocco preventivo dei comportamenti browser indesiderati
        document.addEventListener('touchmove', (e) => {
            // Permette lo scroll solo dentro l'app o la sidebar
            if (!e.target.closest('#app') && !e.target.closest('.sidebar-glass')) {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
