<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LA TAVERNA</title>
<style>
* { margin: -1px; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
body {
  background:
    radial-gradient(circle at 20% 30%, rgba(169,83,236,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(128,0,128,0.35), transparent 40%),
    linear-gradient(135deg,#0f0617,#1c0828,#260c35);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;
}
#main-title { 
  font-size:36px; color:#fff; text-shadow:0 0 12px rgba(169,83,236,0.7); margin-bottom:20px; text-align:center; cursor:pointer; 
}
.login-header h2 { font-size:22px; color:#ccc; margin-bottom:25px; }
.form-group { margin-bottom:18px; text-align:left; }
.form-group label { display:block; margin-bottom:6px; color:#ddd; }
.form-group input {
  width:100%; padding:12px 14px; border-radius:8px; border:none; background:#2c1e4a; color:#fff; font-size:15px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.6); transition:0.2s;
}
.form-group input:focus { outline:none; box-shadow:0 0 6px #a953ec; border:2px solid #a953ec; }
.checkbox-group { display:flex; align-items:center; justify-content:flex-start; gap:10px; margin-bottom:20px; }
.checkbox-group input[type="checkbox"] { width:18px; height:18px; }
.btn { width:100%; padding:14px; background:#a953ec; color:white; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(169,83,236,0.4); }
.divider { text-align:center; margin:20px 0; position:relative; }
.divider::before,.divider::after { content:""; position:absolute; top:50%; width:30%; height:1px; background:#ddd; }
.divider::before { left:0; } .divider::after { right:0; }
.divider span { background: transparent; padding:0 10px; color:#ccc; font-size:14px; }
.social-login { display:flex; justify-content:center; margin-top:15px; }
.social-btn {
  display:flex; align-items:center; justify-content:center; gap:8px; background:#5865F2; color:white;
  border:none; padding:12px 16px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px; transition:0.2s;
}
.social-btn:hover { background:#4752c4; transform:translateY(-2px); box-shadow:0 5px 15px rgba(88,101,242,0.4); }
.footer { text-align:center; margin-top:20px; font-size:14px; color:#ccc; }
.footer a { color:#a953ec; text-decoration:none; cursor:pointer; }
.footer a:hover { text-decoration:underline; }

/* Dashboard / Platform styles */
.pt-header{ width:100%; max-width:900px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.pt-head-left h2{ margin:0; font-size:20px; }
.pt-sub{ color:#c9b6e6; font-size:13px; margin-top:4px; opacity:0.9; }
.pt-head-right{ display:flex; gap:8px; align-items:center; }
.icon-btn{ background:transparent; border:1px solid rgba(255,255,255,0.06); color:inherit; padding:8px; border-radius:8px; cursor:pointer; }
.btn.small{ padding:8px 10px; font-size:14px; border-radius:8px; }

/* layout */
.platform-body{ width:100%; max-width:900px; display:flex; gap:20px; margin-top:18px; }
.pt-aside{ flex:0 0 220px; display:flex; flex-direction:column; gap:12px; }
.pt-main{ flex:1; min-height:320px; }

/* profile card */
.pt-card.pt-profile{ display:flex; gap:10px; align-items:center; background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent); padding:12px; border-radius:8px; }
.pt-avatar{ width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#a953ec,#7a4cc1); font-weight:700; font-size:18px; color:white; box-shadow:0 4px 14px rgba(169,83,236,0.15); }
.pt-name{ font-weight:700; }
.pt-email{ font-size:12px; color:#c9b6e6; opacity:0.9; }

/* nav */
.pt-nav{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.pt-nav .tab-btn{ background:transparent; border:1px solid rgba(255,255,255,0.04); color:inherit; padding:10px; border-radius:8px; text-align:left; cursor:pointer; }
.pt-nav .tab-btn.active{ background:linear-gradient(90deg, rgba(169,83,236,0.18), rgba(169,83,236,0.06)); box-shadow:0 6px 18px rgba(169,83,236,0.06); }

/* quick actions */
.pt-quick{ margin-top:auto; background:rgba(255,255,255,0.02); padding:10px; border-radius:8px; }
.pt-quick-title{ font-size:13px; color:#c9b6e6; margin-bottom:8px; }
.pt-quick-btn{ width:100%; padding:8px; border-radius:8px; border:none; background:#6f3bd6; color:white; cursor:pointer; }

/* main content */
.pt-section{ margin-bottom:18px; padding:12px; background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent); border-radius:8px; }
.pt-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; }
.pt-stat{ padding:12px; border-radius:8px; background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); }
.pt-stat.wide{ grid-column: span 2; }
.pt-stat h4{ margin:0 0 8px 0; font-size:14px; color:#dcd0f9; }
.pt-stat-value{ font-size:20px; font-weight:800; margin-bottom:6px; }
.pt-stat-sub{ font-size:12px; color:#c9b6e6; }

/* progress */
.pt-progress{ background:rgba(255,255,255,0.03); border-radius:8px; height:12px; overflow:hidden; }
.pt-progress-bar{ height:100%; background:linear-gradient(90deg,#a953ec,#7a4cc1); }

/* activity */
.pt-activity{ list-style:none; padding:0; margin:0; }
.pt-activity li{ padding:10px 0; border-bottom:1px dashed rgba(255,255,255,0.03); }
.muted{ color:#c9b6e6; font-size:12px; margin-left:8px; opacity:0.9; }

/* contacts */
.pt-contacts{ display:flex; flex-direction:column; gap:8px; }
.pt-contact{ padding:8px; background:rgba(255,255,255,0.02); border-radius:6px; }

/* toast */
.pt-toast{ position:fixed; right:20px; bottom:20px; background:#222; color:white; padding:10px 14px; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.6); opacity:0; transform:translateY(8px); transition:all .25s ease; z-index:9999; }
.pt-toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="main-title">LA TAVERNA</div>
<div id="ui" style="display:none;"></div>

<script type="module">
// --- CONFIG DISCORD ---
const CONFIG = {
  DISCORD_CLIENT_ID: '1478809987357868083',
  DISCORD_REDIRECT_URI: 'https://nyc.cloud.appwrite.io/v1/account/sessions/oauth2/callback/discord/69a85edc001553a4b931'
};

const uiContainer = document.getElementById('ui');
const mainTitle = document.getElementById('main-title');

// --- RENDER LOGIN ---
function renderLogin() {
  document.title = "LaTaverna - Login";
  uiContainer.style.display = "block";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Login</h2></div>
    <form id="login-form">
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Inserisci la tua password" required /></div>
      <button type="submit" class="btn" id="login-btn">Accedi</button>
      <div class="divider"><span>Oppure</span></div>
      <div class="social-login">
        <button type="button" class="social-btn" id="discord-login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          Login con Discord
        </button>
      </div>
      <div class="footer">Non hai un account? <a id="toRegister">Registrati</a></div>
    </form>
  `;

  // link registrati
  document.getElementById('toRegister').onclick = e => { e.preventDefault(); renderRegister(); };

  // pulsante discord
  document.getElementById('discord-login').onclick = () => {
    const url = `https://discord.com/oauth2/authorize?client_id=${CONFIG.DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.DISCORD_REDIRECT_URI)}&response_type=code&scope=identify%20email`;
    window.location.href = url;
  };

  // submit login fittizio (puoi sostituire con Appwrite o backend reale)
  document.getElementById('login-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: "Utente" };
    showPlatform(user);
  };
}

// --- RENDER REGISTER ---
function renderRegister() {
  document.title = "LaTaverna - Registrati";
  uiContainer.innerHTML = `
    <div class="login-header"><h2>Registrati</h2></div>
    <form id="register-form">
      <div class="form-group"><label for="username">Username</label><input type="text" id="username" placeholder="Inserisci il tuo username" required /></div>
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" placeholder="Inserisci la tua email" required /></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Inserisci la tua password" required /></div>
      <div class="checkbox-group"><input type="checkbox" id="gdpr"/><label for="gdpr">Accetto il GDPR</label></div>
      <button type="submit" class="btn" id="register-btn">Registrati</button>
      <div class="footer">Hai già un account? <a id="toLogin">Login</a></div>
    </form>
  `;

  document.getElementById('toLogin').onclick = e => { e.preventDefault(); renderLogin(); };

  document.getElementById('register-form').onsubmit = e => {
    e.preventDefault();
    const user = { email: document.getElementById('email').value, username: document.getElementById('username').value };
    showPlatform(user);
  };
}

function showPlatform(user) {
  document.title = `LaTaverna - Dashboard${user.username}`;

  uiContainer.innerHTML = `
    <header class="pt-header">
      <div class="pt-head-left">
        <h2>Benvenuto, <span id="pt-username">${user.username}</span></h2>
        <div class="pt-sub">La tua area personale</div>
      </div>
      <div class="pt-head-right">
        <button id="pt-notif" class="icon-btn" title="Notifiche">🔔</button>
        <button id="logout-btn" class="btn small">Esci</button>
      </div>
    </header>

    <div class="platform-body" id="platform-body">
      <aside class="pt-aside">
        <div class="pt-card pt-profile">
          <div class="pt-avatar">${(user.username||'U').slice(0,1).toUpperCase()}</div>
          <div>
            <div class="pt-name">${user.username}</div>
            <div class="pt-email">${user.email || ''}</div>
          </div>
        </div>

        <nav class="pt-nav">
          <button class="tab-btn active" data-tab="dashboard">🏠 Dashboard</button>
          <button class="tab-btn" data-tab="attivita">📝 Attività</button>
          <button class="tab-btn" data-tab="clienti">👥 Rete</button>
          <button class="tab-btn" data-tab="impostazioni">⚙️ Impostazioni</button>
        </nav>

        <div class="pt-quick">
          <div class="pt-quick-title">Azioni rapide</div>
          <button class="pt-quick-btn" id="quick-new">Nuovo post</button>
          <button class="pt-quick-btn" id="quick-invite">Invita</button>
        </div>
      </aside>

      <main id="tab-content" class="pt-main">
        <!-- contenuto dinamico -->
      </main>
    </div>
  `;

  // logout
  document.getElementById('logout-btn').onclick = () => {
    mainTitle.style.display = "block";
    uiContainer.style.display = "none";
    uiContainer.innerHTML = "";
    document.title = "LA TAVERNA";
  };

  // notifications (demo)
  document.getElementById('pt-notif').onclick = () => {
    const n = document.createElement('div');
    n.className = 'pt-toast';
    n.textContent = 'Notifica di prova: Benvenuto nella dashboard!';
    document.body.appendChild(n);
    setTimeout(() => n.classList.add('show'), 10);
    setTimeout(() => n.classList.remove('show'), 4300);
    setTimeout(() => n.remove(), 4800);
  };

  // tab handling
  const tabButtons = uiContainer.querySelectorAll('.tab-btn');
  const tabContent = document.getElementById('tab-content');

  function openTab(tab) {
    tabButtons.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    switch (tab) {
      case 'dashboard':
        tabContent.innerHTML = `
          <section class="pt-grid">
            <article class="pt-stat">
              <h4>Utenti attivi</h4>
              <div class="pt-stat-value">1.234</div>
              <div class="pt-stat-sub">+5% vs ieri</div>
            </article>
            <article class="pt-stat">
              <h4>Nuove iscrizioni</h4>
              <div class="pt-stat-value">87</div>
              <div class="pt-stat-sub">+12% vs sett.</div>
            </article>
            <article class="pt-stat">
              <h4>Entrate</h4>
              <div class="pt-stat-value">€2.430</div>
              <div class="pt-stat-sub">Mese corrente</div>
            </article>
            <article class="pt-stat wide">
              <h4>Obiettivo mensile</h4>
              <div class="pt-progress">
                <div class="pt-progress-bar" style="width:62%"></div>
              </div>
            </article>
          </section>

          <section class="pt-section">
            <h3>Attività recenti</h3>
            <ul class="pt-activity">
              <li><strong>Gioitz</strong> ha commentato il post "Strategia Q2". <span class="muted">2 ore fa</span></li>
              <li><strong>Dan</strong> ha invitato 3 nuovi membri. <span class="muted">ieri</span></li>
              <li><strong>Elle</strong> ha risposto al ticket #123. <span class="muted">3gg fa</span></li>
            </ul>
          </section>
        `;
        break;

      case 'attivita':
        tabContent.innerHTML = `
          <section class="pt-section">
            <h3>Feed attività</h3>
            <p>Caricamento feed… (simulazione)</p>
            <ul class="pt-activity">
              <li>Post example #1 <span class="muted">5m</span></li>
              <li>Post example #2 <span class="muted">1h</span></li>
            </ul>
          </section>
        `;
        break;

      case 'clienti':
        tabContent.innerHTML = `
          <section class="pt-section">
            <h3>Rete contatti</h3>
            <p>Elenco collaboratori e riferimenti.</p>
            <div class="pt-contacts">
              <div class="pt-contact">Elle Piò — <span class="muted">collab</span></div>
              <div class="pt-contact">Sarso — <span class="muted">collab</span></div>
              <div class="pt-contact">Drew — <span class="muted">collab</span></div>
            </div>
          </section>
        `;
        break;

      case 'impostazioni':
        tabContent.innerHTML = `
          <section class="pt-section">
            <h3>Impostazioni account</h3>
            <form id="settings-form">
              <label>Username<input id="set-username" value="${(user.username||'').replace(/"/g,'')}" /></label>
              <label>Email<input id="set-email" value="${(user.email||'').replace(/"/g,'')}" /></label>
              <div style="margin-top:12px;">
                <button id="save-settings" class="btn small">Salva</button>
              </div>
            </form>
          </section>
        `;

        // save settings (demo)
        const saveBtn = document.getElementById('save-settings');
        saveBtn && (saveBtn.onclick = (ev) => {
          ev.preventDefault();
          const newName = document.getElementById('set-username').value.trim() || user.username;
          user.username = newName;
          document.getElementById('pt-username').textContent = newName;
          // qui potresti chiamare API per salvare definitivamente
          const notice = document.createElement('div');
          notice.className = 'pt-toast';
          notice.textContent = 'Impostazioni salvate';
          document.body.appendChild(notice);
          setTimeout(()=> notice.classList.add('show'),10);
          setTimeout(()=> { notice.classList.remove('show'); setTimeout(()=>notice.remove(),400); }, 2000);
        });
        break;
    }
  }

  tabButtons.forEach(btn => btn.onclick = () => openTab(btn.dataset.tab));
  openTab('dashboard'); // default
}

// click sul titolo
mainTitle.onclick = () => {
  mainTitle.style.display = "none";
  renderLogin();
};
</script>
</body>
</html>
