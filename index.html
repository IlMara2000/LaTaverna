<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <meta name="theme-color" content="#0f0617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>LA TAVERNA</title>

    <style>
        /* Reset pulito */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            /* Impedisce lo scroll elastico bianco su iOS */
            background-color: #0f0617; 
            height: 100%;
            overflow: hidden;
        }

        body {
            /* Usa dvh per occupare SEMPRE tutto lo schermo disponibile */
            min-height: 100dvh;
            width: 100%;
            overflow-x: hidden;
            
            /* Background spostato qui per coprire tutto il corpo */
            background: 
                radial-gradient(circle at 20% 30%, rgba(169,83,236,0.25), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(128,0,128,0.35), transparent 40%),
                linear-gradient(135deg,#0f0617,#1c0828,#260c35);
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            /* Gestione rientri di sicurezza (Notch e barra home) */
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            
            color: white;
            text-align: center;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenitore UI per dare respiro agli elementi */
        #ui {
            width: 100%;
            max-width: 400px;
        }

        /* ===== BOTTONE GLASS ===== */
        #main-title {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px; /* Leggermente ridotto per mobile */
            font-weight: 800;
            letter-spacing: 2px;
            padding: 20px 45px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(169,83,236,0.2);
            cursor: pointer;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        #main-title:active {
            transform: scale(0.95);
        }

        /* ===== FORM STYLE ===== */
        .login-header h2 { font-size: 26px; margin-bottom: 25px; font-weight: 700; }
        .form-group { margin-bottom: 20px; text-align: left; width: 100%; }
        .form-group label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a953ec;
            background: rgba(255,255,255,0.12);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #a953ec;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(169,83,236,0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #666;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span { padding: 0 10px; font-size: 13px; }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #5865F2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer { margin-top: 25px; color: #888; font-size: 14px; }
        .footer a { color: #a953ec; font-weight: 600; text-decoration: none; }
    </style>
</head>

<body>

    <div id="main-title">LA TAVERNA</div>
    <div id="ui" style="display:none;"></div>

    <script type="module">
        const CONFIG = {
            DISCORD_CLIENT_ID: '1478809987357868083',
            DISCORD_REDIRECT_URI: 'https://nyc.cloud.appwrite.io/v1/account/sessions/oauth2/callback/discord/69a85edc001553a4b931'
        };

        const uiContainer = document.getElementById('ui');
        const mainTitle = document.getElementById('main-title');

        // Blocco Zoom
        document.addEventListener('gesturestart', e => e.preventDefault());

        function renderLogin() {
            document.title = "LaTaverna - Login";
            uiContainer.style.display = "block";
            uiContainer.innerHTML = `
                <div class="login-header"><h2>Accedi</h2></div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="nome@esempio.com" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn">Entra</button>
                    <div class="divider"><span>OPPURE</span></div>
                    <button type="button" class="social-btn" id="discord-login">Login con Discord</button>
                    <div class="footer">Non hai un account? <a href="#" id="toRegister">Registrati</a></div>
                </form>
            `;

            document.getElementById('toRegister').onclick = e => {
                e.preventDefault();
                renderRegister();
            };

            document.getElementById('discord-login').onclick = () => {
                const url = `https://discord.com/oauth2/authorize?client_id=${CONFIG.DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.DISCORD_REDIRECT_URI)}&response_type=code&scope=identify%20email`;
                window.location.href = url;
            };
        }

        function renderRegister() {
            document.title = "LaTaverna - Registrati";
            uiContainer.innerHTML = `
                <div class="login-header"><h2>Crea Account</h2></div>
                <form id="register-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Il tuo nome" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="nome@esempio.com" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Minimo 8 caratteri" required />
                    </div>
                    <button type="submit" class="btn">Registrati</button>
                    <div class="footer">Hai già un account? <a href="#" id="toLogin">Login</a></div>
                </form>
            `;
            document.getElementById('toLogin').onclick = e => {
                e.preventDefault();
                renderLogin();
            };
        }

        mainTitle.onclick = () => {
            mainTitle.style.display = "none";
            renderLogin();
        };
    </script>
</body>
</html>
